<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PausePoint Settings</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 480px;
            margin: 48px auto;
            padding: 0 24px;
            color: #1a1a1a;
        }

        h1 {
            font-size: 20px;
            margin-bottom: 28px;
        }

        .field {
            margin-bottom: 20px;
        }

        .field label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 8px 12px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        input[type="password"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2);
        }

        .toggle-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toggle-row label {
            font-size: 14px;
            font-weight: 600;
            margin: 0;
            cursor: pointer;
        }

        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #4f46e5;
            cursor: pointer;
            flex-shrink: 0;
        }

        button {
            margin-top: 8px;
            padding: 8px 20px;
            font-size: 14px;
            font-weight: 600;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #4338ca;
        }

        #status {
            margin-top: 12px;
            font-size: 13px;
            min-height: 18px;
        }

        .saved { color: #16a34a; }
        .error  { color: #dc2626; }
    </style>
</head>
<body>
    <h1>PausePoint Settings</h1>

    <div class="field">
        <label for="apiKey">Gemini API Key</label>
        <input type="password" id="apiKey" placeholder="Paste your Gemini API key here" />
    </div>

    <div class="field">
        <label for="language">Language</label>
        <input type="text" id="language" placeholder="English, Francais, Espanol" />
    </div>

    <div class="field">
        <div class="toggle-row">
            <input type="checkbox" id="textToSpeech" />
            <label for="textToSpeech">Read summary aloud</label>
        </div>
    </div>

    <button id="save">Save</button>
    <p id="status"></p>

    <script src="options.js"></script>
</body>
</html>
