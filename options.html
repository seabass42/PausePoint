<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PausePoint Settings</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 480px;
            margin: 48px auto;
            padding: 0 24px;
            color: #1a1a1a;
        }

        h1 {
            font-size: 20px;
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        input[type="password"] {
            width: 100%;
            padding: 8px 12px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2);
        }

        button {
            margin-top: 16px;
            padding: 8px 20px;
            font-size: 14px;
            font-weight: 600;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #4338ca;
        }

        #status {
            margin-top: 12px;
            font-size: 13px;
            min-height: 18px;
        }

        .saved { color: #16a34a; }
        .error  { color: #dc2626; }
    </style>
</head>
<body>
    <h1>PausePoint Settings</h1>
    <label for="apiKey">Gemini API Key</label>
    <input type="password" id="apiKey" placeholder="Paste your Gemini API key here" />
    <p id="status"></p>
    <label for="language">Language</label>
    <input type="text" id="language" placeholder="English, Francais, Espanol" />
    <p></p>
    <button id="save">Save</button>
    <script src="options.js"></script>
</body>
</html>
